<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Launching Course…</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #scoContainer {
        width: 100%;
        height: 100%;
      }
    </style>

    <!-- Load the custom SCORM API loader. -->
    <script src="./discere-scorm-loader.js"></script>

    <!-- Load the DiscereNow SCORM wrapper. -->
    <script src="./DiscereScormController.js"></script>

    <!-- Create and launch the SCO iframe. -->
    <script>
      function launchSco() {
        const iframe = document.createElement("iframe");
        iframe.name = "courseContent";
        iframe.src = "../scormcontent/index.html";
        iframe.width = "100%";
        iframe.height = "100%";
        iframe.style.border = "none";

        iframe.onload = () => {
          // Expose the API resolved by the loader to the SCO iframe.
          iframe.contentWindow.API = window.API;
          iframe.contentWindow.API_1484_11 = window.API_1484_11;
          // Expose the wrapper used by the course runtime.
          iframe.contentWindow.DiscereSCORM = window.DiscereSCORM;
          // Initialize SCORM communication.
          iframe.contentWindow.DiscereSCORM.initialize();
        };

        document.getElementById("scoContainer").appendChild(iframe);
      }

      // Launch the SCO after the page finishes loading.
      window.addEventListener("load", launchSco);
    </script>
  </head>

  <body>
    <div id="scoContainer"></div>
  </body>
</html>
